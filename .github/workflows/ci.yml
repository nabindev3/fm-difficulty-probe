name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CPU-only torch wheels: the tests are model-free and the CUDA wheel plus its
  # nvidia-* dependencies (~6 GB installed) would dominate CI time and disk.
  PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  # Known-CVE scan of the frozen lock. Non-blocking by design: the lock is a
  # bit-reproducibility snapshot, so an advisory in a pinned version should
  # surface as a loud annotation here (and a Dependabot alert), then be fixed
  # by a deliberate pin bump + reproduce.sh rerun — not by an auto-red build.
  audit:
    name: pip-audit (requirements.lock)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pip-audit
      # --no-deps: audit exactly the pins in the lock (transitives are audited
      # in the tests-lock job's resolved env by Dependabot alerts instead).
      #
      # Ignored advisories (reviewed 2026-07-11) — all four require an
      # attacker-supplied model, checkpoint or TorchScript program, and this
      # repo only loads the pinned Pythia + Chronos weights from their org repos:
      #   CVE-2025-3000   torch.jit.script memory corruption — no fixed release.
      #   PYSEC-2025-217  X-CLIP checkpoint-conversion RCE — no fixed release.
      #   CVE-2026-1839   Trainer torch.load RCE — fixed in transformers 5.x.
      #   CVE-2026-4372   config-injection RCE — fixed in transformers 5.3.
      # The transformers-5 pair drops out when the lock's modality backends are
      # bumped (needs chronos-forecasting>=2.3.1, transformers>=5.3.0 and a
      # reproduce.sh rerun to regenerate the committed CIs — see the lock header).
      - run: >
          pip-audit --strict -r requirements.lock --disable-pip --no-deps
          --ignore-vuln CVE-2025-3000
          --ignore-vuln PYSEC-2025-217
          --ignore-vuln CVE-2026-1839
          --ignore-vuln CVE-2026-4372

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check core experiments modalities tests

  # Floors install (requirements.txt / pyproject ranges) — what a new user gets
  # from a plain `pip install -e .` today. Catches breakage against the newest
  # resolvable versions.
  tests:
    name: pytest (floors, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package (floor versions)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -q

  # Exact-pin install from requirements.lock — the environment the committed
  # CIs and the Phase-2 regression gate are calibrated against. Catches lock
  # rot (a pin that stops resolving) and pin/test incompatibilities early.
  # Note: the lock was captured on CPython 3.10.20 / macOS-arm64; this job uses
  # the runner's latest 3.10.x on Linux, so it checks installability and test
  # health, not bit-reproducibility of the CIs (that still needs the exact
  # interpreter + BLAS documented in the lock header).
  tests-lock:
    name: pytest (requirements.lock, py3.10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install exact pins
        run: pip install -r requirements.lock
      - name: Install package without re-resolving deps
        run: pip install -e . --no-deps
      - name: Run tests
        run: pytest tests/ -q
